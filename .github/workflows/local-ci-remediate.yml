# Local: CI Remediation
# Calls the reusable ci-remediate workflow whenever a check suite fails
# on a PR in this repo.
#
# Required repo secret: CLAUDE_CODE_OAUTH_TOKEN
#
name: "Local: CI Remediate"

on:
  check_suite:
    types: [completed]

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write
  actions: read
  checks: read

concurrency:
  group: agentic-ci-remediate-${{ github.event.check_suite.id }}
  cancel-in-progress: false

jobs:
  detect-pr:
    if: github.event.check_suite.conclusion == 'failure'
    runs-on: ubuntu-latest
    outputs:
      has_pr: ${{ steps.extract.outputs.has_pr }}
      pr_number: ${{ steps.extract.outputs.pr_number }}
      pr_branch: ${{ steps.extract.outputs.pr_branch }}
    steps:
      - name: Extract PR details
        id: extract
        env:
          PULL_REQUESTS: ${{ toJson(github.event.check_suite.pull_requests) }}
        run: |
          PR_COUNT=$(echo "$PULL_REQUESTS" | jq 'length')
          if [ "$PR_COUNT" -gt 0 ]; then
            echo "has_pr=true"                                          >> "$GITHUB_OUTPUT"
            echo "pr_number=$(echo "$PULL_REQUESTS" | jq -r '.[0].number')" >> "$GITHUB_OUTPUT"
            echo "pr_branch=$(echo "$PULL_REQUESTS" | jq -r '.[0].head.ref')" >> "$GITHUB_OUTPUT"
          else
            echo "has_pr=false" >> "$GITHUB_OUTPUT"
          fi

  remediate:
    needs: detect-pr
    if: needs.detect-pr.outputs.has_pr == 'true'
    uses: ./.github/workflows/ci-remediate.yml
    with:
      pr_number: ${{ needs.detect-pr.outputs.pr_number }}
      pr_branch: ${{ needs.detect-pr.outputs.pr_branch }}
    secrets: inherit
