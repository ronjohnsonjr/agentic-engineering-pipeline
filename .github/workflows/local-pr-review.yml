# Local: PR Review
# Calls the reusable pr-review workflow for AI-powered code review on
# every PR opened or updated against main in this repo.
#
# Required repo secret: CLAUDE_CODE_OAUTH_TOKEN
#
name: "Local: PR Review"

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, ready_for_review]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to review"
        required: true
        type: number

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write
  actions: read

concurrency:
  group: agentic-pr-review-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pr-review:
    if: github.event_name == 'workflow_dispatch' || !github.event.pull_request.draft
    uses: ./.github/workflows/pr-review.yml
    with:
      pr_number: ${{ inputs.pr_number || 0 }}
    secrets: inherit
