# Local: PR Review
# Calls the reusable pr-review workflow for AI-powered code review on
# every PR opened or updated against main in this repo.
#
# Required repo secret: CLAUDE_CODE_OAUTH_TOKEN
#
name: "Local: PR Review"

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, ready_for_review]
    # Exclude changes to the review workflows themselves — claude-code-action@v1
    # validates the calling workflow against main and will always fail when the
    # workflow file being reviewed is the same one that changed in the PR.
    paths-ignore:
      - '.github/workflows/local-pr-review.yml'
      - '.github/workflows/pr-review.yml'
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to review"
        required: true
        type: number

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write
  actions: read

# cancel-in-progress is false because the Claude job polls for Copilot
# internally — killing a running job aborts remediation and wastes tokens.
concurrency:
  group: agentic-pr-review-${{ github.event.pull_request.number || inputs.pr_number || github.ref }}
  cancel-in-progress: false

jobs:
  pr-review:
    if: github.event_name == 'workflow_dispatch' || !github.event.pull_request.draft
    uses: ./.github/workflows/pr-review.yml
    with:
      pr_number: ${{ inputs.pr_number || 0 }}
    secrets: inherit
