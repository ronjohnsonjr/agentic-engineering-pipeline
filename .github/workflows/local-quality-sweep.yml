# Local: Quality Sweep
# Calls the reusable quality-sweep workflow on a weekly schedule and on
# manual dispatch. Keeps this repo's own code clean.
#
# Required repo secret: CLAUDE_CODE_OAUTH_TOKEN
# Optional repo secret: SECRETS_ADMIN_PAT (for OAuth token auto-refresh)
#
name: "Local: Quality Sweep"

on:
  schedule:
    # Every Monday at 09:00 UTC
    - cron: "0 9 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  id-token: write

concurrency:
  group: agentic-quality-sweep-${{ github.ref }}
  cancel-in-progress: false

jobs:
  quality-sweep:
    uses: ./.github/workflows/quality-sweep.yml
    secrets: inherit
