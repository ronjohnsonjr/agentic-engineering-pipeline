# Reusable workflow: PR Description Generator
# Auto-generates a rich PR description from the diff when a PR is opened
# with an empty or minimal body.
#
# Usage in consuming repo:
#   uses: <org>/agentic-ci/.github/workflows/pr-describe.yml@main
#
name: "Agentic: PR Describe"

on:
  workflow_call:
    inputs:
      model:
        description: "Claude model to use"
        type: string
        default: "haiku"
      min_body_length:
        description: "Only generate if PR body is shorter than this (chars)"
        type: number
        default: 50
      claude_args:
        description: "Additional CLI args passed to claude-code-action"
        type: string
        default: ""
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN:
        required: true
      SECRETS_ADMIN_PAT:
        required: false

permissions:
  contents: read
  pull-requests: write
  id-token: write

jobs:
  pr-describe:
    name: Agentic PR Description
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # The body-length check happens in the first step (GHA expressions
    # don't have a length() function). This job always runs on PR open.
    steps:
      - name: Check body length
        id: check
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
          MIN_LEN: ${{ inputs.min_body_length }}
        run: |
          BODY_LEN=${#PR_BODY}
          if [ "$BODY_LEN" -ge "$MIN_LEN" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout repository
        if: steps.check.outputs.skip != 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate PR description
        if: steps.check.outputs.skip != 'true'
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: ${{ inputs.claude_args }}
          prompt: |
            PR #${{ github.event.pull_request.number }} was opened with an empty
            or minimal description. Generate a rich PR body from the diff.

            ## Steps

            1. Get the full diff:
               ```bash
               BASE=${{ github.event.pull_request.base.ref }}
               git fetch origin $BASE
               git diff origin/$BASE..HEAD
               ```

            2. Get the commit log:
               ```bash
               git log origin/$BASE..HEAD --oneline
               ```

            3. Read the repo's pull_request_template.md if it exists
               (`.github/pull_request_template.md` or `pull_request_template.md`).

            4. Generate a PR description that includes:
               - **Summary**: 2-4 bullet points of what changed and why
               - **Type of Change**: inferred from the diff (bug fix, feature, refactor, etc.)
               - **Key Changes**: file-by-file or module-by-module breakdown
               - **Testing**: what tests were added or modified
               - If a PR template exists, fill in its sections instead

            5. Update the PR body:
               ```bash
               gh pr edit ${{ github.event.pull_request.number }} --body "<generated body>"
               ```

            ## Agent override

            If the repo contains `.claude/agents/pr-describe.md`, read it
            and follow its project-specific instructions. Those instructions take
            precedence over the generic steps above for any conflicts.

            ## Rules
            - Be factual. Describe what the code does, not what you think the intent was.
            - If commit messages are descriptive, use them as source material.
            - Keep it concise: aim for 10-20 lines total.
            - Do not add sections the template doesn't have.
            - Add a footer: "*Description auto-generated by Claude via agentic-ci.*"
