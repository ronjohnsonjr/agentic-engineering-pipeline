# Reusable workflow: PR Review Orchestrator
# Triggers the full Copilot + Claude collaborative review cycle on a PR.
#
# Usage in consuming repo:
#   uses: <org>/agentic-ci/.github/workflows/pr-review.yml@main
#
name: "Agentic: PR Review"

on:
  workflow_call:
    inputs:
      model:
        description: "Claude model to use"
        type: string
        default: "sonnet"
      max_copilot_wait_minutes:
        description: "Max minutes to wait for Copilot review"
        type: number
        default: 10
      max_review_rounds:
        description: "Max rounds of Copilot feedback to process"
        type: number
        default: 2
      claude_args:
        description: "Additional CLI args passed to claude-code-action"
        type: string
        default: ""
      pr_number:
        description: "PR number to review (required when triggered via workflow_dispatch)"
        type: number
        default: 0
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN:
        required: true

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write
  actions: read

jobs:
  pr-review:
    name: Agentic PR Review
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Resolve PR ref
        id: pr-ref
        if: inputs.pr_number != 0
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          sha=$(gh api repos/${{ github.repository }}/pulls/${{ inputs.pr_number }} --jq '.head.sha')
          echo "sha=$sha" >> $GITHUB_OUTPUT

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ steps.pr-ref.outputs.sha || github.event.pull_request.head.sha || github.sha }}

      - name: Run Claude PR Review Orchestrator
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          allowed_bots: 'claude'
          additional_permissions: |
            actions: read
          claude_args: ${{ inputs.claude_args }}
          prompt: |
            You are running an automated PR review workflow on PR #${{ inputs.pr_number || github.event.pull_request.number }}.

            ## Your task

            Orchestrate a full collaborative code review cycle. Do NOT exit until all steps
            are complete, including Copilot's review and your remediation of every comment.

            ### Step 1 — Request Copilot as a reviewer

            Check whether Copilot has already been requested or has already reviewed:
            ```
            gh api repos/${{ github.repository }}/pulls/${{ inputs.pr_number || github.event.pull_request.number }}/requested_reviewers
            gh api repos/${{ github.repository }}/pulls/${{ inputs.pr_number || github.event.pull_request.number }}/reviews
            ```
            If Copilot is not already a requested reviewer and has not yet reviewed, request it:
            ```
            gh api repos/${{ github.repository }}/pulls/${{ inputs.pr_number || github.event.pull_request.number }}/requested_reviewers \
              -X POST -f 'reviewers[]=Copilot'
            ```
            If that fails (Copilot may be a GitHub App, not a user), try:
            ```
            gh pr edit ${{ inputs.pr_number || github.event.pull_request.number }} --add-reviewer "Copilot"
            ```
            If both fail, note it and continue — Copilot may already be auto-triggered.

            ### Step 2 — Perform Claude's independent review

            Read the PR diff and all changed files:
            ```
            gh pr diff ${{ inputs.pr_number || github.event.pull_request.number }}
            ```
            Conduct your own thorough code review. For each issue you find, post an inline
            review comment using the GitHub API. At the end, submit your review as COMMENT
            (not APPROVE or REQUEST_CHANGES — that is reserved for the summary step).

            ### Step 3 — Wait for Copilot's review

            Poll every 20 seconds, up to ${{ inputs.max_copilot_wait_minutes }} minutes, until
            a review from copilot, github-copilot[bot], copilot-pull-request-reviewer[bot],
            or github-code-quality appears:
            ```
            gh api repos/${{ github.repository }}/pulls/${{ inputs.pr_number || github.event.pull_request.number }}/reviews
            ```
            If Copilot does not respond within the wait window, proceed with only your own comments.

            ### Step 4 — Catalog ALL review comments

            Collect every inline comment and review summary on the PR:
            ```
            gh api repos/${{ github.repository }}/pulls/${{ inputs.pr_number || github.event.pull_request.number }}/comments
            gh api repos/${{ github.repository }}/pulls/${{ inputs.pr_number || github.event.pull_request.number }}/reviews
            ```
            Include comments from Copilot, yourself, and any other reviewers. Skip any comment
            you have already replied to in a previous round.

            ### Step 5 — Remediate every comment

            For EACH unaddressed comment, take exactly one action:

            FIX — if the comment identifies a legitimate issue:
            - Make the minimal code change needed
            - Reply on the thread: "Resolved: [what changed and why]."

            ACKNOWLEDGE — if valid but no code change is needed:
            - Reply: "Acknowledged: [explanation]. No change made."

            DECLINE — if the suggestion is incorrect or would degrade quality:
            - Reply: "Declined: [reasoning]."

            ### Step 6 — Run quality checks

            After all fixes:
            - If a Makefile has a `check` target: `make check`
            - Else if pyproject.toml exists: `ruff check . && pytest`
            - Else if package.json exists: `npm test`
            - Otherwise: skip and note "no quality gate found"

            If quality checks fail after a fix, revert that fix and re-classify as DECLINE.

            ### Step 7 — Commit and push

            Batch related fixes into logical commits with conventional commit messages.
            Push to the PR branch.

            ### Step 8 — Iterate (up to ${{ inputs.max_review_rounds }} rounds)

            After pushing, wait up to ${{ inputs.max_copilot_wait_minutes }} minutes for any
            new Copilot follow-up review. If new comments appear, repeat steps 4–7.
            Stop early if Copilot repeats the same findings (convergence).

            ### Step 9 — Post summary

            Post a top-level PR comment:

            ## Code Review Summary

            **Reviewers**: [list reviewers whose comments were processed]
            **Total Comments Reviewed**: N
            **Resolved (fixed)**: N | **Acknowledged**: N | **Declined**: N

            ### Changes Made
            - [each fix with file:line reference]

            ### Items Acknowledged
            - [each with rationale]

            ### Items Declined
            - [each with rationale]

            ### Commits
            - [SHAs and messages]

            ---
            *Review orchestrated by Claude via agentic-ci.*

            ## Agent override

            If the repo contains `.claude/agents/pr-review-orchestrator.md`, read it
            and follow its project-specific instructions. Those instructions take
            precedence over the generic steps above for any conflicts.

            ## Rules
            - Always reply ON the comment thread, not as a separate top-level comment.
            - If a fix introduces test failures, revert and decline with explanation.
            - Respect any project conventions from CLAUDE.md if present.
            - Use conventional commits for all fix commits.
            - Do NOT exit until Step 9 is complete.
