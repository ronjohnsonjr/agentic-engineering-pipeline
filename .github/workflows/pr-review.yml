# Reusable workflow: PR Review Orchestrator
# Triggers the full Copilot + Claude collaborative review cycle on a PR.
#
# Usage in consuming repo:
#   uses: <org>/agentic-ci/.github/workflows/pr-review.yml@main
#
name: "Agentic: PR Review"

on:
  workflow_call:
    inputs:
      model:
        description: "Claude model to use"
        type: string
        default: "sonnet"
      max_copilot_wait_minutes:
        description: "Max minutes to wait for Copilot review"
        type: number
        default: 10
      max_review_rounds:
        description: "Max rounds of Copilot feedback to process"
        type: number
        default: 2
      claude_args:
        description: "Additional CLI args passed to claude-code-action"
        type: string
        default: "--dangerously-skip-permissions --max-turns 100"
      pr_number:
        description: "PR number to review (required when triggered via workflow_dispatch)"
        type: number
        default: 0
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN:
        required: true

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write
  actions: read

jobs:
  pr-review:
    name: Agentic PR Review
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Resolve PR ref
        id: pr-ref
        if: inputs.pr_number != 0
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          sha=$(gh api repos/${{ github.repository }}/pulls/${{ inputs.pr_number }} --jq '.head.sha')
          echo "sha=$sha" >> $GITHUB_OUTPUT

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ steps.pr-ref.outputs.sha || github.event.pull_request.head.sha || github.sha }}

      - name: Run Claude PR Review Orchestrator
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          show_full_output: true
          allowed_bots: 'claude'
          additional_permissions: |
            actions: read
          claude_args: ${{ inputs.claude_args }}
          prompt: |
            You are running an automated PR review workflow on PR #${{ inputs.pr_number || github.event.pull_request.number }}.
            Do NOT exit until every step below is complete, including the final summary comment.

            ## Step 1 — Request Copilot as a reviewer

            Check whether Copilot has already been requested or has already reviewed:
            ```bash
            gh api repos/${{ github.repository }}/pulls/${{ inputs.pr_number || github.event.pull_request.number }}/requested_reviewers
            gh api repos/${{ github.repository }}/pulls/${{ inputs.pr_number || github.event.pull_request.number }}/reviews
            ```
            If Copilot has not been requested and has not already reviewed, request it:
            ```bash
            gh api repos/${{ github.repository }}/pulls/${{ inputs.pr_number || github.event.pull_request.number }}/requested_reviewers \
              -X POST -f 'reviewers[]=Copilot'
            ```
            If that fails (Copilot may be a GitHub App), try:
            ```bash
            gh pr edit ${{ inputs.pr_number || github.event.pull_request.number }} --add-reviewer "Copilot"
            ```
            If both fail, note it and continue — Copilot may be auto-triggered.

            ## Step 2 — Wait for Copilot's "Reviewed changes" overview

            Poll every 20 seconds, up to ${{ inputs.max_copilot_wait_minutes }} minutes.
            On each poll, fetch all reviews:
            ```bash
            gh api repos/${{ github.repository }}/pulls/${{ inputs.pr_number || github.event.pull_request.number }}/reviews
            ```
            You are waiting for a review whose `user.login` matches one of:
            `copilot`, `github-copilot[bot]`, `copilot-pull-request-reviewer[bot]`,
            `github-code-quality`
            AND whose `body` contains the text "Reviewed changes".

            Do NOT proceed to Step 3 until this exact condition is met OR the wait window
            expires. If the window expires without seeing "Reviewed changes", note the
            timeout and proceed with only your own review in Step 3.

            ## Step 3 — Perform Claude's independent review

            Read the PR diff and all changed files:
            ```bash
            gh pr diff ${{ inputs.pr_number || github.event.pull_request.number }}
            ```
            Conduct a thorough code review. For each issue found, post an inline review
            comment. Submit your review as COMMENT (never APPROVE or REQUEST_CHANGES).

            ## Step 4 — Catalog all review threads with thread IDs

            Fetch all review threads via GraphQL so you have the thread IDs needed to
            resolve them after addressing each one:
            ```bash
            OWNER=$(echo "${{ github.repository }}" | cut -d/ -f1)
            REPO=$(echo "${{ github.repository }}" | cut -d/ -f2)
            PR_NUM=${{ inputs.pr_number || github.event.pull_request.number }}
            gh api graphql -f query="
              query {
                repository(owner: \"$OWNER\", name: \"$REPO\") {
                  pullRequest(number: $PR_NUM) {
                    reviewThreads(first: 100) {
                      nodes {
                        id
                        isResolved
                        comments(first: 10) {
                          nodes {
                            databaseId
                            author { login }
                            body
                            path
                            line
                          }
                        }
                      }
                    }
                  }
                }
              }
            "
            ```
            Build a catalog of all unresolved threads. For each thread record:
            - `id` — the GraphQL node ID (used with `resolveReviewThread`)
            - `databaseId` of the first comment — the numeric ID used with the REST
              reply endpoint (`/pulls/{number}/comments/{databaseId}/replies`)
            - first-comment author login, file path, line, and body

            Prioritize threads from Copilot (any of the bot logins above), then threads
            from other reviewers.

            ## Step 5 — Address and resolve every Copilot thread

            Process every unresolved thread whose first comment is from Copilot.
            For EACH thread, do all three sub-steps:

            **5a. Choose an action:**

            FIX — the comment identifies a legitimate issue:
            - Apply the minimal code change.
            - Reply on the thread: "Fixed: [one sentence describing what changed]."

            ACKNOWLEDGE — valid observation but no code change needed:
            - Reply: "Acknowledged: [explanation]."

            DECLINE — incorrect suggestion or would degrade quality:
            - Reply: "Declined: [reasoning]."

            **5b. Reply on the thread** using the REST API with the `databaseId` of
            the first comment in the thread (the numeric integer from the GraphQL catalog):
            ```bash
            gh api repos/${{ github.repository }}/pulls/${{ inputs.pr_number || github.event.pull_request.number }}/comments/<databaseId>/replies \
              -X POST -f body="<your reply>"
            ```

            **5c. Resolve the thread** using GraphQL immediately after replying:
            ```bash
            gh api graphql -f query="
              mutation {
                resolveReviewThread(input: { threadId: \"<THREAD_ID>\" }) {
                  thread { isResolved }
                }
              }
            "
            ```

            Do not move to Step 6 until every Copilot thread has been replied to and resolved.

            ## Step 6 — Address and resolve your own threads

            Repeat Step 5 for any unresolved threads from your own review (Step 3).
            Same FIX / ACKNOWLEDGE / DECLINE logic. Reply then resolve each thread.

            ## Step 7 — Run quality checks

            After all fixes:
            - Makefile with `check` target: `make check`
            - Else pyproject.toml: `ruff check . && pytest`
            - Else package.json: `npm test`
            - Otherwise: note "no quality gate found"

            If a quality check fails after a fix, revert that fix, re-reply on the thread:
            "Reverted: quality gate failed — [first 10 lines of gate output].", then
            re-resolve the thread.

            ## Step 8 — Commit and push

            Batch fixes into logical commits with conventional commit messages.
            Push to the PR branch.

            ## Step 9 — Iterate (up to ${{ inputs.max_review_rounds }} rounds)

            After pushing, poll up to ${{ inputs.max_copilot_wait_minutes }} minutes for a
            new Copilot review whose body contains "Reviewed changes". If new unresolved
            Copilot threads appear, repeat Steps 4–8. Stop if Copilot repeats identical
            comment bodies (convergence).

            ## Step 10 — Post summary comment

            Post a single top-level comment on the PR:

            ```
            ## Code Review Summary

            **Reviewers processed**: [list]
            **Total threads**: N | **Fixed**: N | **Acknowledged**: N | **Declined**: N | **Reverted**: N

            ### Changes Made
            - <file>:<line> — <what changed>

            ### Acknowledged
            - <comment summary> — <rationale>

            ### Declined
            - <comment summary> — <rationale>

            ### Quality Gate
            [PASS | FAIL | not found]

            ### Commits
            - <sha> <message>

            ---
            *Review orchestrated by Claude via agentic-ci.*
            ```

            ## Agent override

            If the repo contains `.claude/agents/pr-review-orchestrator.md`, read it
            and follow its project-specific instructions. Those instructions take
            precedence over the generic steps above for any conflicts.

            ## Rules
            - Do NOT exit until Step 10 is complete.
            - Do NOT advance past Step 2 until a Copilot review body containing
              "Reviewed changes" is observed, or the wait window expires.
            - Resolve every thread immediately after replying to it — never leave a
              replied-to thread unresolved.
            - Always reply ON the thread, never as a separate top-level comment.
            - If a fix introduces test failures, revert it and decline with explanation.
            - Use conventional commits for all fix commits.
            - Respect project conventions from CLAUDE.md if present.

      - name: Escalate on max-turns limit
        if: always() && steps.claude-review.outputs.conclusion == 'error_max_turns'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUM: ${{ inputs.pr_number || github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          # Post an informational comment on the PR so reviewers know the review is incomplete.
          gh pr comment "$PR_NUM" \
            --repo "$REPO" \
            --body "$(cat <<'COMMENT'
          ## :warning: Review incomplete — complexity limit reached

          The automated review hit the maximum turn limit before finishing all steps.
          A follow-up issue has been created so a human can complete the review or re-trigger it manually.

          *This is informational only — the CI check is not failing because of this.*
          COMMENT
          )"

          # Open a GitHub issue with enough context to continue the work.
          gh issue create \
            --repo "$REPO" \
            --title "PR #${PR_NUM}: automated review hit max-turns limit — needs follow-up" \
            --body "$(cat <<ISSUE
          ## Background

          The [PR Review workflow](${RUN_URL}) for PR #${PR_NUM} exceeded the maximum turn limit
          (\`error_max_turns\`) and stopped before posting the final summary comment.

          ## Next steps

          Choose one of the following:

          1. **Re-trigger manually** — go to [Actions → Local: PR Review](${GITHUB_SERVER_URL}/${REPO}/actions/workflows/local-pr-review.yml)
             and run it with PR number \`${PR_NUM}\`. The prompt has idempotent steps so it is safe to re-run.
          2. **Review manually** — open PR #${PR_NUM} and address any outstanding review threads by hand.
          3. **Raise the turn limit** — increase \`max_turns\` in the \`claude_args\` input on the calling workflow
             if this PR is legitimately larger than normal.

          ## Context

          - Repository: \`${REPO}\`
          - PR number: \`${PR_NUM}\`
          - Failed run: ${RUN_URL}
          - Conclusion: \`error_max_turns\`
          ISSUE
          )" \
            --label "needs-attention"

          echo "Escalation complete. Exiting 0 to avoid noisy CI failure."
          exit 0
