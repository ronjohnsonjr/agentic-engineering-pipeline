# Local: Issue to PR
# Calls the reusable issue-to-pr workflow on this repo itself.
# Trigger: label "local" added to any issue.
#
# Required repo secret: CLAUDE_CODE_OAUTH_TOKEN
#
name: "Local: Issue to PR"

on:
  issues:
    types: [labeled]

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write
  actions: read

concurrency:
  group: agentic-issue-to-pr-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  issue-to-pr:
    if: github.event.label.name == 'local'
    uses: ./.github/workflows/issue-to-pr.yml
    secrets: inherit
