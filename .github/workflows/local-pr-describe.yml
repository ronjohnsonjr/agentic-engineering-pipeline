# Local: PR Description
# Calls the reusable pr-describe workflow to auto-generate PR descriptions
# when a PR targeting main is opened with a minimal or empty body.
#
# Skips bot-authored PRs: the agentic pipeline (issue-to-pr) already writes
# a full description, so running the describe workflow on those PRs is wasted
# work and generates noise. The job-level `if` makes the workflow conclusion
# "skipped" (rather than "success with no-op"), which the cleanup workflow
# can then prune.
#
# Required repo secret: CLAUDE_CODE_OAUTH_TOKEN
#
name: "Local: PR Describe"

on:
  pull_request:
    branches: [main]
    types: [opened]

permissions:
  contents: read
  pull-requests: write
  id-token: write

concurrency:
  group: agentic-pr-describe-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pr-describe:
    # Skip bot-created PRs (e.g. from the issue-to-pr pipeline) — they already
    # include a full description, so regenerating it would be redundant.
    if: github.event.pull_request.user.type != 'Bot'
    uses: ./.github/workflows/pr-describe.yml
    secrets: inherit
