# Reusable workflow: Linear repository_dispatch bridge
# Triggered by a repository_dispatch event fired by the Linear webhook server
# when an issue moves to the configured trigger status (default: "In Progress",
# override with LINEAR_TRIGGER_STATUS env var on the webhook server).
#
# Usage in consuming repo:
#   uses: <org>/agentic-ci/.github/workflows/repository-dispatch-linear.yml@main
#
name: "Agentic: Linear repository_dispatch bridge"

on:
  workflow_call:
    inputs:
      issue_id:
        description: "Linear issue ID from the repository_dispatch payload"
        type: string
        required: true
      issue_title:
        description: "Linear issue title from the repository_dispatch payload"
        type: string
        required: true
      trigger_status:
        description: "The Linear status that triggered this run (informational)"
        type: string
        default: ""
      ref:
        description: "Git ref to check out and push changes to"
        type: string
        default: "main"
      model:
        description: "Claude model to use"
        type: string
        default: "sonnet"
      max_verify_attempts:
        description: "Max verification fix cycles"
        type: number
        default: 3
      claude_args:
        description: "Additional CLI args passed to claude-code-action"
        type: string
        default: "--dangerously-skip-permissions"
      mcp_config:
        description: "JSON MCP server config (e.g. for Linear MCP)"
        type: string
        default: ""
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN:
        required: true

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write
  actions: read

jobs:
  implement:
    name: Implement Linear Issue
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.ref }}

      - name: Run Claude Issue-to-PR Pipeline (Linear)
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          show_full_output: true
          additional_permissions: |
            actions: read
          claude_args: ${{ inputs.claude_args }}
          mcp_config: ${{ inputs.mcp_config }}
          prompt: |
            You are the root orchestrator for a Linear-triggered issue-to-PR pipeline.
            A Linear issue has moved to the "${{ inputs.trigger_status || 'configured trigger' }}"
            status and is ready for automated implementation.

            Linear issue ID: ${{ inputs.issue_id }}
            Linear issue title: ${{ inputs.issue_title }}
            Max verify attempts: ${{ inputs.max_verify_attempts }}

            ## Step 1 — Load context

            1. Read `AGENTS.md` if it exists — it documents the pipeline topology,
               stage definitions, and failure modes for this repo.
            2. Read `CLAUDE.md` if it exists — project conventions all agents must follow.
            3. If an MCP config was provided, use the Linear MCP server to fetch the
               full issue details (description, acceptance criteria, attachments).

            ## Step 2 — Create feature branch

            ```bash
            SLUG=$(echo "${{ inputs.issue_title }}" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9]/-/g' | cut -c1-50)
            BRANCH="linear-${{ inputs.issue_id }}-${SLUG}"
            git checkout -b "$BRANCH"
            ```

            ## Step 3 — Run pipeline stages via sub-agents

            Use the Agent tool to spawn each specialist sub-agent in an isolated context.
            Pass the structured output of each stage as input to the next. Gate-check
            every output before advancing.

            ### Stage 1: Clarify
            Delegate to `clarifier`. Pass the full issue text.
            Gate: `VERDICT: CLEAR`. If `VERDICT: NEEDS CLARITY`, halt and post the
            blocking questions as an issue comment. Do not continue until answered.
            Skip only if the issue has explicit, numbered acceptance criteria and no
            ambiguous scope.

            ### Stage 2: Research
            Delegate to `researcher`. Pass the clarifier's SUMMARY and ACCEPTANCE CRITERIA.
            Gate: RESEARCH BRIEF must contain AFFECTED FILES, INTERFACES, EXISTING TESTS,
            and RISKS AND CONSTRAINTS sections. Halt if any section is missing.

            ### Stage 3: Plan
            Delegate to `planner`. Pass the RESEARCH BRIEF and clarifier's ACCEPTANCE CRITERIA.
            Gate: IMPLEMENTATION PLAN must contain ordered STEP entries, OUT OF SCOPE,
            and RISKS sections. Halt if any section is missing.

            ### Stage 4: Implement
            Delegate to `programmer`. Pass the IMPLEMENTATION PLAN and issue summary.
            Gate: `IMPLEMENTATION RESULT: COMPLETE` and `QUALITY GATE: PASS`.
            If `QUALITY GATE: FAIL`, delegate to `pr-remediator` then re-run `programmer`.
            Repeat up to ${{ inputs.max_verify_attempts }} times. Halt if still failing.
            If `IMPLEMENTATION RESULT: HALTED`, halt immediately.

            ### Stage 5: Test (run applicable agents)
            - Always delegate to `unit-tester`.
            - Delegate to `backend-tester` if API routes, DB schemas, or service
              boundaries changed. Skip with justification if not applicable.
            - Delegate to `frontend-tester` if frontend routes, components, or user
              flows changed. Skip with justification if not applicable.
            Gate: all invoked test agents must return PASS. Halt if any returns FAIL.
            Record skip reason for any skipped agent.

            ### Stage 6: Review
            Delegate to `ai-reviewer`. Pass the clarifier's ACCEPTANCE CRITERIA.
            Gate: `REVIEW RESULT: APPROVED`.
            If `REVIEW RESULT: CHANGES REQUIRED`, delegate to `pr-remediator` with the
            BLOCKING ISSUES list, then re-run `ai-reviewer`. Up to 3 cycles total.
            If not APPROVED after 3 cycles, halt and leave the PR open for human review.

            ### Stage 7: Linear status update (if MCP available)
            Delegate to the `linear` agent. Pass the issue ID and stage "In Review".
            Skip if no Linear MCP config was provided.

            ### Stage 8: Create PR
            Delegate to `pr-creator`. Pass the issue title, branch name, and a pipeline
            summary (stages completed, stages skipped with reasons).
            Gate: `PR RESULT: CREATED`. Halt and report on any pre-flight failure.

            ## Step 4 — Report result

            Output the structured pipeline result and post it as a comment on any
            associated GitHub issue:

            ```
            PIPELINE RESULT: [COMPLETE | HALTED]
            ISSUE: <Linear issue ID> — <title>
            STAGES: <comma-separated list of completed stages>
            SKIPPED: <comma-separated list with reason, or "none">
            PR: <url or "not created">
            HALT STAGE: <stage name if halted, or "none">
            HALT REASON: <description if halted, or "none">
            ```

            ## Agent override

            If the repo contains `.claude/agents/repository-dispatch-linear.md`, read it
            and follow its project-specific instructions. Those instructions take
            precedence over the generic steps above for any conflicts.

            ## Rules
            - Never force push.
            - Never skip quality gates.
            - Never retry the same failing inputs more than ${{ inputs.max_verify_attempts }} times.
            - All commits must use conventional commit messages (feat/fix/chore/refactor/test/docs).
            - Close the PR body with:
              `*Implemented autonomously by Claude via agentic-ci (Linear webhook bridge).*`
