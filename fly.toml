# fly.toml — Fly.io deployment configuration for the Linear webhook bridge.
# Deploy with: fly deploy
# Set secrets with: fly secrets set LINEAR_WEBHOOK_SECRET=... GITHUB_TOKEN=... GITHUB_REPOSITORY=... GITHUB_DEFAULT_BRANCH=main LINEAR_TRIGGER_STATUS="In Progress"

app = "linear-webhook-bridge"
primary_region = "iad"

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    grace_period = "5s"
    interval = "30s"
    method = "GET"
    path = "/health"
    protocol = "http"
    timeout = "5s"

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
