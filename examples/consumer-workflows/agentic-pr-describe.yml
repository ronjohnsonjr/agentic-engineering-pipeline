# Drop this into your repo's .github/workflows/ to auto-generate PR descriptions.
# When a PR is opened with an empty body, Claude fills it in from the diff.
#
# Prerequisites:
#   - Set CLAUDE_CODE_OAUTH_TOKEN as a repo or org secret
#
name: "Agentic: PR Describe"

on:
  pull_request:
    types: [opened]

concurrency:
  group: agentic-pr-describe-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  describe:
    # Skip bot PRs (Dependabot has its own description)
    if: >
      !startsWith(github.actor, 'dependabot')
    uses: onyx-point/agentic-ci/.github/workflows/pr-describe.yml@main
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
    # Uncomment to customize:
    # with:
    #   min_body_length: 100
