# Drop this into your repo's .github/workflows/ to enable periodic quality sweeps.
# Runs weekly (or on demand) to clean dead code, unused imports, and naming issues.
#
# Prerequisites:
#   - Set ANTHROPIC_API_KEY as a repo or org secret
#   - (Optional) Add .claude/agents/quality-sweep.md for project-specific behavior
#
name: "Agentic: Quality Sweep"

on:
  schedule:
    # Every Monday at 06:00 UTC
    - cron: "0 6 * * 1"
  workflow_dispatch:
    inputs:
      scope:
        description: "Directory to sweep (empty = full repo)"
        required: false
        default: ""

concurrency:
  group: agentic-quality-sweep
  cancel-in-progress: true

jobs:
  sweep:
    uses: onyx-point/agentic-ci/.github/workflows/quality-sweep.yml@main
    secrets:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    with:
      scope: ${{ inputs.scope || '' }}
      auto_commit: true
