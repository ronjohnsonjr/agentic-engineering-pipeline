# Drop this into your repo's .github/workflows/ to auto-review Dependabot PRs.
# Claude reads the changelog, checks for breaking changes, and posts a risk assessment.
#
# Prerequisites:
#   - Set CLAUDE_CODE_OAUTH_TOKEN as a repo or org secret
#
name: "Agentic: Dependabot Review"

on:
  pull_request:
    types: [opened, synchronize]

concurrency:
  group: agentic-dependabot-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    # Only run for Dependabot PRs
    if: github.actor == 'dependabot[bot]'
    uses: ronjohnsonjr/agentic-engineering-pipeline/.github/workflows/dependabot-review.yml@main
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
    # Uncomment to customize:
    # with:
    #   auto_approve_patch: true
