# Docker Compose for the agentic sandbox with Docker-in-Docker support.
#
# Usage:
#   docker compose -f sandbox/docker-compose.yml up -d
#   docker compose -f sandbox/docker-compose.yml exec agent bash
#
# The `dind` service runs the Docker daemon. The `agent` service points
# DOCKER_HOST at it, making `docker` commands available to agents without
# running a daemon inside the agent container itself.
#
# Network access: agents can reach public package registries and documentation
# sites. No production databases or internal services are attached.

services:
  # ── Docker-in-Docker daemon ─────────────────────────────────────────────────
  dind:
    image: docker:24-dind
    privileged: true
    environment:
      # TLS is intentionally disabled for this sandbox environment.
      # Accepted risk: Docker API traffic between agent and dind travels
      # unencrypted over the isolated sandbox-net bridge. This is acceptable
      # because: (1) sandbox-net is a local bridge used for dev/CI only,
      # (2) no production secrets or internal APIs are attached to this network,
      # (3) enabling TLS requires cert distribution between services which adds
      # significant operational complexity for a sandboxed dev environment.
      # If the sandbox is ever exposed to untrusted multi-tenant environments,
      # enable TLS: set DOCKER_TLS_CERTDIR=/certs and DOCKER_HOST=tcp://dind:2376
      # with DOCKER_TLS_VERIFY=1 in the agent service.
      DOCKER_TLS_CERTDIR: ""
    networks:
      - sandbox-net
    volumes:
      - dind-storage:/var/lib/docker
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "docker", "info"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Agent execution environment ─────────────────────────────────────────────
  agent:
    build:
      context: ..
      dockerfile: sandbox/Dockerfile
    depends_on:
      dind:
        condition: service_healthy
    environment:
      # Point Docker CLI at the DinD daemon; TLS disabled for simplicity.
      DOCKER_HOST: "tcp://dind:2375"
      # Git credentials are injected at runtime; never hard-coded here.
      GH_TOKEN: "${GH_TOKEN:-}"
      GITHUB_TOKEN: "${GITHUB_TOKEN:-}"
      # Package registry mirrors can be configured via environment variables.
      NPM_CONFIG_REGISTRY: "${NPM_CONFIG_REGISTRY:-https://registry.npmjs.org/}"
      PIP_INDEX_URL: "${PIP_INDEX_URL:-https://pypi.org/simple/}"
    networks:
      - sandbox-net
    volumes:
      # Mount the checked-out workspace into the container.
      - "${WORKSPACE_PATH:-.}:/workspace:z"
    working_dir: /workspace
    # Keep the container alive for interactive or CI use.
    command: sleep infinity

networks:
  # Isolated network: agents can reach the internet but not any host-local
  # services (production databases, internal APIs) unless explicitly added here.
  sandbox-net:
    driver: bridge

volumes:
  dind-storage:
